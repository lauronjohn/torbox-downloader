appId: app.torbox.downloader
productName: TorBox Downloader
copyright: Copyright © 2026 John Lauron
directories:
  buildResources: build
  output: dist
files:
  - out/**
  - package.json
mac:
  category: public.app-category.utilities
  target:
    - target: dmg
      arch: universal
  artifactName: "${productName}-${version}.${ext}"
win:
  target:
    - nsis
  artifactName: "${productName}-${version}-Setup.${ext}"
linux:
  target:
    - AppImage
  category: Utility
  artifactName: "${productName}-${version}.${ext}"
